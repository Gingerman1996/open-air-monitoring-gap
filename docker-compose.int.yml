# Integration stack for the AG Docker host — https://tools.airgradient.net/openair-int
# Deployed by ./deploy.sh int. Same shape as docker-compose.prod.yml; only the
# defaults differ (int sub-path + loopback port) so int and prod can coexist on one host.
# `name:` keeps int and prod in separate Compose projects (see docker-compose.prod.yml).
name: openair-int
services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: openair
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.int}
      POSTGRES_DB: openair
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/timescale.sql:/docker-entrypoint-initdb.d/02-timescale.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openair -d openair"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF persistence so the runtime feature flags (e.g. donations on/off) survive a restart
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://openair:${POSTGRES_PASSWORD}@postgres:5432/openair
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      SEED_ON_START: "true"
      REFERENCE_ON_START: "true"
      INGEST_ON_START: "true"
      TIMESCALE_ON_START: "true"
      INGEST_SCHEDULE: "true"
      INGEST_INTERVAL_MS: "${INGEST_INTERVAL_MS:-600000}"
      REFERENCE_CRON: "${REFERENCE_CRON:-0 0 1 * *}"
      REFERENCE_TZ: "${REFERENCE_TZ:-Asia/Bangkok}"
      AIRGRADIENT_MAP_API: "${AIRGRADIENT_MAP_API:-https://map-data.airgradient.com/map/api/v1}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?set ADMIN_TOKEN in .env.int}"
      DONATIONS_ENABLED: "${DONATIONS_ENABLED:-true}"
    # listen() only starts after the boot pipeline (seed → reference → ingest) — see prod
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        APP_BASE_URL: ${APP_BASE_URL:-/openair-int/}
    restart: unless-stopped
    environment:
      # API base derives from APP_BASE_URL at build — see prod for why it isn't set here
      APP_BASE_URL: ${APP_BASE_URL:-/openair-int/}
      API_PROXY_TARGET: http://api:3001
      PORT: "3000"
    ports:
      - "127.0.0.1:${WEB_PORT:-5301}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
