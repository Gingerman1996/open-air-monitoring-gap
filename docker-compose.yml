services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: openair
      POSTGRES_PASSWORD: openair
      POSTGRES_DB: openair
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openair -d openair"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://openair:openair@postgres:5432/openair
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      SEED_ON_START: "true"
      INGEST_ON_START: "true"
      INGEST_SCHEDULE: "true"
      INGEST_INTERVAL_MS: "${INGEST_INTERVAL_MS:-600000}"
      AIRGRADIENT_MAP_API: "https://map-data.airgradient.com/map/api/v1"
      CORS_ORIGIN: "*"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # PostGIS → vector tiles (auto-discovers the country_tiles function source)
  martin:
    image: ghcr.io/maplibre/martin:v0.14.2
    command: ["postgres://openair:openair@postgres:5432/openair"]
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      # browser calls same-origin /api/v1; Nitro proxies it to the api container (works behind nginx too)
      NUXT_PUBLIC_API_BASE: "/api/v1"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - api
      - martin

  # optional reverse proxy — `docker compose --profile edge up`
  nginx:
    image: nginx:alpine
    profiles: ["edge"]
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  pgdata:
