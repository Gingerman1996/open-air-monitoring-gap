services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: openair
      POSTGRES_PASSWORD: openair
      POSTGRES_DB: openair
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/timescale.sql:/docker-entrypoint-initdb.d/02-timescale.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openair -d openair"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://openair:openair@postgres:5432/openair
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      SEED_ON_START: "true"
      REFERENCE_ON_START: "true"
      INGEST_ON_START: "true"
      TIMESCALE_ON_START: "true"
      INGEST_SCHEDULE: "true"
      INGEST_INTERVAL_MS: "${INGEST_INTERVAL_MS:-600000}"
      REFERENCE_CRON: "${REFERENCE_CRON:-0 0 1 * *}"
      REFERENCE_TZ: "${REFERENCE_TZ:-Asia/Bangkok}"
      AIRGRADIENT_MAP_API: "https://map-data.airgradient.com/map/api/v1"
      CORS_ORIGIN: "*"
      ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
      DONATIONS_ENABLED: "${DONATIONS_ENABLED:-true}"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      # browser calls same-origin /api/v1; the Nitro proxy route forwards it to the api container
      NUXT_PUBLIC_API_BASE: "/api/v1"
      API_PROXY_TARGET: "http://api:3001"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - api

  # optional reverse proxy — `docker compose --profile edge up`
  nginx:
    image: nginx:alpine
    profiles: ["edge"]
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

  # public share tunnel — `NGROK_AUTHTOKEN=… docker compose --profile share up -d ngrok`
  # one origin is enough: the browser only talks to web:3000, which server-proxies /api.
  # inspector + current public URL at http://localhost:4040
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["share"]
    command: ["http", "web:3000"]
    environment:
      # soft default so the rest of the stack still runs without it; the ngrok
      # container fails on its own if the `share` profile is started tokenless
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN:-}"
    ports:
      - "4040:4040"
    depends_on:
      - web

volumes:
  pgdata:
