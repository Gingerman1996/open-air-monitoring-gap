events {}

http {
  upstream web { server web:3000; }
  upstream api { server api:3001; }
  upstream martin { server martin:3000; }

  server {
    listen 80;

    # API → NestJS (keeps the /api/v1 prefix intact)
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # vector tiles → Martin (strip the /tiles/ prefix)
    location /tiles/ {
      proxy_pass http://martin/;
      proxy_set_header Host $host;
    }

    # everything else → Nuxt
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
