# Production stack for the AG Docker host — https://tools.airgradient.net/openair
# Deployed by ./deploy.sh prod (git pull → version.json → build → up).
# Only `web` is published, and only to 127.0.0.1 so the host's front reverse-proxy
# (TLS + /openair/ routing) can reach it; postgres, redis and api stay on the
# internal compose network. The front proxy MUST pass the /openair prefix through.
# `name:` keeps prod and int in separate Compose projects — without it both env
# stacks resolve to the directory-derived project and clobber each other's
# containers and pgdata/redisdata volumes.
name: openair

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: openair
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: openair
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/timescale.sql:/docker-entrypoint-initdb.d/02-timescale.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openair -d openair"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF persistence so the runtime feature flags (e.g. donations on/off) survive a restart
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://openair:${POSTGRES_PASSWORD}@postgres:5432/openair
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      SEED_ON_START: "true"
      REFERENCE_ON_START: "true"
      INGEST_ON_START: "true"
      TIMESCALE_ON_START: "true"
      INGEST_SCHEDULE: "true"
      INGEST_INTERVAL_MS: "${INGEST_INTERVAL_MS:-600000}"
      REFERENCE_CRON: "${REFERENCE_CRON:-0 0 1 * *}"
      REFERENCE_TZ: "${REFERENCE_TZ:-Asia/Bangkok}"
      AIRGRADIENT_MAP_API: "${AIRGRADIENT_MAP_API:-https://map-data.airgradient.com/map/api/v1}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?set ADMIN_TOKEN in .env.production}"
      DONATIONS_ENABLED: "${DONATIONS_ENABLED:-true}"
    # listen() only starts after the boot pipeline (seed → reference → ingest), which can
    # take minutes on a fresh DB — start_period covers that so web waits for a real API
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        APP_BASE_URL: ${APP_BASE_URL:-/openair/}
    restart: unless-stopped
    environment:
      # browser calls same-origin <base>/api/v1 (derived from APP_BASE_URL at build);
        # the Nitro proxy strips <base> and forwards to api. NUXT_PUBLIC_API_BASE is only
        # for overriding that derivation — don't set it here or the two can drift.
      APP_BASE_URL: ${APP_BASE_URL:-/openair/}
      API_PROXY_TARGET: http://api:3001
      PORT: "5600"
    ports:
      - "127.0.0.1:${WEB_PORT:-5600}:5600"
    depends_on:
      api:
        condition: service_healthy
    networks:
      default:
      app-network:
        aliases:
          - openair

volumes:
  pgdata:
  redisdata:

networks:
  default:
    name: openair_internal
  app-network:
    external: true
    name: app-network
